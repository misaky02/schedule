<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月間スケジュール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #f0f4f8; height: 100vh; overflow: hidden; }

  /* HEADER */
  .header {
    background: #fff; border-bottom: 2px solid #e2e8f0;
    padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06); flex-shrink: 0;
  }
  .header h1 { font-size: 17px; color: #1e293b; font-weight: 700; }
  .month-nav { display: flex; align-items: center; gap: 10px; }
  .month-nav button {
    background: #f1f5f9; border: none; border-radius: 8px;
    padding: 6px 13px; cursor: pointer; font-size: 15px; color: #475569;
    font-family: inherit; font-weight: 700;
  }
  .month-nav button:hover { background: #e2e8f0; }
  .month-label { font-size: 16px; font-weight: 700; color: #334155; min-width: 120px; text-align: center; }

  /* LAYOUT */
  .layout { display: grid; grid-template-columns: 1fr 310px; flex: 1; overflow: hidden; }

  /* CALENDAR */
  .cal-wrap { display: flex; flex-direction: column; overflow: hidden; }
  .dow-header {
    display: grid; grid-template-columns: repeat(7,1fr);
    background: #fff; border-bottom: 1px solid #e2e8f0; flex-shrink: 0;
  }
  .dow-cell { text-align: center; padding: 8px 4px; font-size: 12px; font-weight: 700; color: #64748b; }
  .dow-cell.sun { color: #ef4444; }
  .dow-cell.sat { color: #3b82f6; }
  .cal-body {
    display: grid; grid-template-columns: repeat(7,1fr);
    border-left: 1px solid #e2e8f0; border-top: 1px solid #e2e8f0;
    overflow-y: auto; flex: 1; align-content: start;
  }
  .cal-day { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; min-height: 100px; padding: 4px; background: #fff; }
  .cal-day.other-month { background: #f8fafc; }
  .cal-day.today-bg { background: #fefce8; }
  .cal-day:hover { background: #f0f9ff; }
  .day-num {
    font-size: 12px; font-weight: 700; color: #334155;
    width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
    border-radius: 50%; margin-bottom: 2px;
  }
  .day-num.today-circle { background: #6366f1; color: #fff; }
  .day-num.sun { color: #ef4444; }
  .day-num.sat { color: #3b82f6; }
  .other-month .day-num { color: #c8d4e0; }
  .event-chip {
    display: flex; align-items: center; gap: 3px;
    padding: 2px 5px; border-radius: 4px; font-size: 10px; font-weight: 700;
    margin-bottom: 2px; cursor: pointer; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; line-height: 1.5;
  }
  .event-chip:hover { filter: brightness(0.93); }
  .event-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .more-badge { font-size: 10px; color: #94a3b8; padding: 1px 4px; cursor: pointer; }

  /* RIGHT PANEL */
  .panel {
    background: #fff; border-left: 2px solid #e2e8f0;
    overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 20px;
  }

  .sec-block { display: flex; flex-direction: column; gap: 10px; }
  .sec-title {
    font-size: 12px; color: #475569; font-weight: 700; letter-spacing: 0.05em;
    border-bottom: 2px solid #f1f5f9; padding-bottom: 6px;
  }

  /* Form */
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 10px; font-weight: 700; color: #64748b; letter-spacing: 0.07em; text-transform: uppercase; }
  .form-group input, .form-group textarea, .form-group select {
    padding: 7px 9px; border: 1.5px solid #e2e8f0; border-radius: 7px;
    font-size: 12px; color: #1e293b; font-family: inherit; background: #f8fafc; outline: none;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #6366f1; background: #fff; }
  .form-group textarea { resize: vertical; min-height: 48px; }
  .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .btn-add {
    padding: 9px; border-radius: 9px; border: none;
    background: linear-gradient(135deg, #6366f1, #818cf8);
    color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
    box-shadow: 0 3px 10px rgba(99,102,241,0.3);
  }
  .btn-add:hover { opacity: 0.9; }

  /* Filter tabs */
  .filter-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .ftab {
    padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 700;
    cursor: pointer; border: 1.5px solid #e2e8f0; background: #fff; color: #64748b;
    transition: all 0.15s; font-family: inherit;
  }
  .ftab.active { border-color: transparent; color: #fff; }

  /* Schedule list */
  .sched-list { display: flex; flex-direction: column; gap: 5px; }
  .sched-item {
    padding: 7px 9px; border-radius: 8px; border-left: 3px solid;
    display: flex; justify-content: space-between; align-items: flex-start; gap: 4px;
  }
  .sched-title { font-size: 11px; font-weight: 700; }
  .sched-sub { font-size: 10px; color: #64748b; margin-top: 1px; }
  .sched-tag { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 9px; font-weight: 700; margin-top: 2px; }
  .btn-del { background: none; border: none; cursor: pointer; color: #cbd5e1; font-size: 12px; flex-shrink: 0; padding: 0; }
  .btn-del:hover { color: #ef4444; }
  .no-item { font-size: 11px; color: #94a3b8; text-align: center; padding: 8px 0; }

  /* TODO */
  .todo-add-row { display: flex; gap: 6px; }
  .todo-add-row input { flex: 1; padding: 7px 9px; border: 1.5px solid #e2e8f0; border-radius: 7px; font-size: 12px; color: #1e293b; font-family: inherit; background: #f8fafc; outline: none; }
  .todo-add-row input:focus { border-color: #6366f1; background: #fff; }
  .btn-todo-add { padding: 7px 12px; border-radius: 7px; border: none; background: #6366f1; color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .btn-todo-add:hover { opacity: 0.9; }
  .todo-selects { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .todo-selects select { padding: 6px 8px; border: 1.5px solid #e2e8f0; border-radius: 7px; font-size: 11px; color: #1e293b; font-family: inherit; background: #f8fafc; outline: none; }
  .todo-selects select:focus { border-color: #6366f1; background: #fff; }
  .todo-list { display: flex; flex-direction: column; gap: 5px; }
  .todo-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 8px 10px; border-radius: 9px; border-left: 3px solid;
  }
  .todo-check { width: 15px; height: 15px; border-radius: 4px; border: 2px solid #cbd5e1; cursor: pointer; flex-shrink: 0; margin-top: 2px; appearance: none; -webkit-appearance: none; position: relative; }
  .todo-check:checked { background: #6366f1; border-color: #6366f1; }
  .todo-check:checked::after { content: '✓'; position: absolute; color: #fff; font-size: 10px; top: -1px; left: 1px; }
  .todo-text { font-size: 12px; font-weight: 700; color: #1e293b; }
  .todo-text.done { text-decoration: line-through; color: #94a3b8; }
  .todo-meta { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 2px; align-items: center; }
  .todo-tag { padding: 1px 6px; border-radius: 8px; font-size: 9px; font-weight: 700; }

  /* MODAL */
  .overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.5); display: flex; align-items: center; justify-content: center; z-index: 200; }
  .modal { background: #fff; border-radius: 14px; padding: 22px; width: min(380px,95vw); box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
  .modal h3 { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 14px; }
  .modal-events { display: flex; flex-direction: column; gap: 8px; max-height: 320px; overflow-y: auto; }
  .modal-event { padding: 10px 12px; border-radius: 8px; border-left: 4px solid; display: flex; justify-content: space-between; align-items: flex-start; }
  .modal-close { float: right; background: none; border: none; font-size: 18px; cursor: pointer; color: #94a3b8; }
</style>
</head>
<body>

<div id="pin-screen" style="position:fixed;inset:0;background:#f0f4f8;z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:20px;padding:40px;box-shadow:0 20px 50px rgba(0,0,0,0.15);text-align:center;width:280px">
    <div style="font-size:32px;margin-bottom:8px">🔒</div>
    <div style="font-size:18px;font-weight:700;color:#1e293b;margin-bottom:4px">月間スケジュール</div>
    <div style="font-size:12px;color:#94a3b8;margin-bottom:24px">PINコードを入力してください</div>
    <input type="password" id="pin-input" maxlength="6" placeholder="••••"
      style="width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:10px;font-size:24px;text-align:center;letter-spacing:8px;font-family:inherit;outline:none;color:#1e293b"
      onkeydown="if(event.key==='Enter')checkPin()">
    <div id="pin-error" style="color:#ef4444;font-size:12px;margin-top:8px;height:16px"></div>
    <button onclick="checkPin()" style="margin-top:16px;width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">入力</button>
  </div>
</div>

<div id="main-content" style="display:none;flex-direction:column;height:100vh">
<div class="header">
  <h1>📅 月間スケジュール</h1>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="month-label"></div>
    <button onclick="changeMonth(1)">›</button>
    <button onclick="goToday()" style="font-size:11px;padding:6px 11px;">今月</button>
  </div>
</div>

<div class="layout">
  <!-- CALENDAR  -->
  <div class="cal-wrap">
    <div class="dow-header">
      <div class="dow-cell sun">日</div>
      <div class="dow-cell">月</div>
      <div class="dow-cell">火</div>
      <div class="dow-cell">水</div>
      <div class="dow-cell">木</div>
      <div class="dow-cell">金</div>
      <div class="dow-cell sat">土</div>
    </div>
    <div class="cal-body" id="cal-body"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel">

    <!-- 入力 -->
    <div class="sec-block">
      <div class="sec-title">📝 スケジュール入力</div>
      <div class="form-group">
        <label>日付</label>
        <input type="date" id="f-date" onchange="document.getElementById('f-date-end').value=this.value">
      </div>
      <div class="form-group">
        <label>開始時間</label>
        <input type="time" id="f-time-start" value="09:00">
      </div>
      <div class="form-group">
        <label>終了日</label>
        <input type="date" id="f-date-end">
      </div>
      <div class="form-group">
        <label>終了時間</label>
        <input type="time" id="f-time-end" value="10:00">
      </div>
      <div class="form-group">
        <label>先生名</label>
        <select id="f-teacher">
          <option value="">選択してください</option>
          <option>小畑先生</option><option>山森先生</option><option>あさ稲先生</option>
          <option>畠先生</option><option>壱先生</option><option>熊雪先生</option>
          <option>編集部予定</option><option>プライベート</option>
        </select>
      </div>
      <div class="form-group">
        <label>内容</label>
        <select id="f-content">
          <option value="">選択してください</option>
          <option>告知</option><option>締切</option><option>イベント・フェア</option>
        </select>
      </div>
      <div class="form-group">
        <label>メモ</label>
        <textarea id="f-memo" placeholder="詳細・場所など"></textarea>
      </div>
      <button class="btn-add" onclick="addSchedule()">＋ カレンダーに追加</button>
    </div>

    <!-- 今月の予定 -->
    <div class="sec-block">
      <div class="sec-title">📋 今月の予定</div>
      <div class="filter-tabs" id="filter-tabs"></div>
      <div class="sched-list" id="schedule-list"></div>
    </div>

    <!-- TODO -->
    <div class="sec-block">
      <div class="sec-title">✅ TODOリスト</div>
      <div class="todo-add-row">
        <input type="text" id="todo-text" placeholder="TODOを入力...">
        <button class="btn-todo-add" onclick="addTodo()">追加</button>
      </div>
      <select id="todo-teacher" style="padding:6px 8px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:11px;color:#1e293b;font-family:inherit;background:#f8fafc;outline:none;width:100%">
        <option value="">先生を選択</option>
        <option>小畑先生</option><option>山森先生</option><option>あさ稲先生</option>
        <option>畠先生</option><option>壱先生</option><option>熊雪先生</option>
        <option>編集部予定</option><option>プライベート</option>
      </select>
      <div class="filter-tabs" id="todo-filter-tabs"></div>
      <div class="todo-list" id="todo-list"></div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h3 id="modal-title"></h3>
    <div class="modal-events" id="modal-events"></div>
  </div>
</div>

<script>
const TEACHER_COLORS = {
  '小畑先生':    { bg: '#fed7aa', text: '#9a3412' },
  '山森先生':    { bg: '#fbc8d9', text: '#9d174d' },
  'あさ稲先生':  { bg: '#fef08a', text: '#854d0e' },
  '畠先生':      { bg: '#93c5fd', text: '#1e40af' },
  '壱先生':      { bg: '#fca5a5', text: '#991b1b' },
  '熊雪先生':    { bg: '#b2e8f5', text: '#0e7490' },
  '編集部予定':  { bg: '#d8b4fe', text: '#6b21a8' },
  'プライベート':{ bg: '#e2e8f0', text: '#475569' },
};
const CONTENT_COLORS = {
  '告知':             { bg: '#dbeafe', text: '#1e40af' },
  '締切':             { bg: '#fee2e2', text: '#991b1b' },
  'イベント・フェア': { bg: '#d1fae5', text: '#065f46' },
};
const TEACHERS = Object.keys(TEACHER_COLORS);
const DAYS_JA = ['日','月','火','水','木','金','土'];

let schedules = [], todos = [];
let nextSID = 1, nextTID = 1;
let monthOffset = 0;
let listFilter = 'すべて', todoFilter = 'すべて';

function getTC(t) { return TEACHER_COLORS[t] || { bg: '#e0f2fe', text: '#0c4a6e' }; }
function fmt(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function timeToMin(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
function getCurrentYM() {
  const d = new Date(); d.setDate(1); d.setMonth(d.getMonth()+monthOffset);
  return { year: d.getFullYear(), month: d.getMonth() };
}

function changeMonth(d) { monthOffset+=d; renderCalendar(); renderList(); }
function goToday() { monthOffset=0; renderCalendar(); renderList(); }

// Filter tabs
function renderFilterTabs() {
  const el = document.getElementById('filter-tabs');
  el.innerHTML = ['すべて',...TEACHERS].map(t => {
    const tc = t==='すべて' ? {bg:'#6366f1',text:'#fff'} : getTC(t);
    const a = listFilter===t;
    return `<button class="ftab${a?' active':''}" style="${a?`background:${tc.bg};color:${tc.text};border-color:${tc.bg}`:''}" onclick="setListFilter('${t}')">${t}</button>`;
  }).join('');
}
function setListFilter(t) { listFilter=t; renderFilterTabs(); renderList(); renderCalendar(); }

function renderTodoFilterTabs() {
  const el = document.getElementById('todo-filter-tabs');
  el.innerHTML = ['すべて',...TEACHERS].map(t => {
    const tc = t==='すべて' ? {bg:'#6366f1',text:'#fff'} : getTC(t);
    const a = todoFilter===t;
    return `<button class="ftab${a?' active':''}" style="${a?`background:${tc.bg};color:${tc.text};border-color:${tc.bg}`:''}" onclick="setTodoFilter('${t}')">${t}</button>`;
  }).join('');
}
function setTodoFilter(t) { todoFilter=t; renderTodoFilterTabs(); renderTodoList(); }

// addSchedule is handled by Notion version below
// deleteSchedule is handled by Notion version below

// addTodo, toggleTodo, deleteTodo are handled by Notion version below

function renderTodoList() {
  const el=document.getElementById('todo-list');
  let list=todos;
  if(todoFilter!=='すべて') list=list.filter(t=>t.teacher===todoFilter);
  list=[...list.filter(t=>!t.done),...list.filter(t=>t.done)];
  if(!list.length){el.innerHTML='<div class="no-item">TODOはありません</div>';return;}
  el.innerHTML=list.map(t=>{
    const tc=getTC(t.teacher);

    return `<div class="todo-item" style="border-color:${tc.bg};background:${tc.bg}44">
      <input type="checkbox" class="todo-check" ${t.done?'checked':''} onchange="toggleTodo(${t.id})">
      <div style="flex:1;min-width:0">
        <div class="todo-text${t.done?' done':''}">${t.text}</div>
        <div class="todo-meta">
          ${t.teacher?`<span style="font-size:10px;font-weight:700;color:${tc.text}">${t.teacher}</span>`:''}

        </div>
      </div>
      <button class="btn-del" onclick="deleteTodo('${t.id}')">&times;</button>
    </div>`;
  }).join('');
}

// List
function renderList() {
  const {year,month}=getCurrentYM();
  const el=document.getElementById('schedule-list');
  const ms=`${year}-${String(month+1).padStart(2,'0')}`;
  let list=schedules.filter(s=>s.date.startsWith(ms));
  if(listFilter!=='すべて') list=list.filter(s=>s.teacher===listFilter);
  list.sort((a,b)=>(a.date+a.timeStart).localeCompare(b.date+b.timeStart));
  if(!list.length){el.innerHTML='<div class="no-item">予定はありません</div>';return;}
  el.innerHTML=list.map(s=>{
    const cc=s.content?CONTENT_COLORS[s.content]:null;
    return `<div class="sched-item" style="border-color:${s.color};background:${s.color}55">
      <div style="min-width:0">
        <div class="sched-title" style="color:${s.textColor}">${s.teacher}</div>
        ${cc?`<span class="sched-tag" style="background:${cc.bg};color:${cc.text}">${s.content}</span>`:''}
        <div class="sched-sub">${s.date} ${s.timeStart} 〜 ${s.dateEnd&&s.dateEnd!==s.date?s.dateEnd+' ':''} ${s.timeEnd||''}</div>
        ${s.memo?`<div class="sched-sub">${s.memo}</div>`:''}
      </div>
      <button class="btn-del" onclick="deleteSchedule('${s.id}')">&times;</button>
    </div>`;
  }).join('');
}

// Calendar
function renderCalendar() {
  const {year,month}=getCurrentYM();
  document.getElementById('month-label').textContent=`${year}年 ${month+1}月`;
  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  const todayStr=fmt(new Date());
  const startDow=firstDay.getDay();
  const totalCells=Math.ceil((startDow+lastDay.getDate())/7)*7;
  let html='';
  for(let i=0;i<totalCells;i++){
    const cellDate=new Date(year,month,1-startDow+i);
    const dateStr=fmt(cellDate);
    const isThisMonth=cellDate.getMonth()===month;
    const isToday=dateStr===todayStr;
    const dow=cellDate.getDay();
    let dayEvents=schedules.filter(s=>s.date===dateStr);
    if(listFilter!=='すべて') dayEvents=dayEvents.filter(s=>s.teacher===listFilter);
    dayEvents.sort((a,b)=>a.timeStart.localeCompare(b.timeStart));
    let numClass='';
    if(dow===0) numClass='sun';
    if(dow===6) numClass='sat';
    if(isToday) numClass+=' today-circle';
    const maxShow=3;
    let evHtml=dayEvents.slice(0,maxShow).map(s=>`
      <div class="event-chip" style="background:${s.color};color:${s.textColor}" onclick="openModal('${dateStr}')">
        <span class="event-dot" style="background:${s.textColor}"></span>
        <span>${s.timeStart} ${s.teacher}${s.content?' ['+s.content+']':''}</span>
      </div>`).join('');
    if(dayEvents.length>maxShow) evHtml+=`<div class="more-badge" onclick="openModal('${dateStr}')">+${dayEvents.length-maxShow}件</div>`;
    html+=`<div class="cal-day${!isThisMonth?' other-month':''}${isToday?' today-bg':''}">
      <div class="day-num ${numClass}">${cellDate.getDate()}</div>${evHtml}</div>`;
  }
  document.getElementById('cal-body').innerHTML=html;
}

// Modal
function openModal(dateStr) {
  let dayEvents=schedules.filter(s=>s.date===dateStr);
  if(listFilter!=='すべて') dayEvents=dayEvents.filter(s=>s.teacher===listFilter);
  dayEvents.sort((a,b)=>a.timeStart.localeCompare(b.timeStart));
  if(!dayEvents.length) return;
  const d=new Date(dateStr+'T00:00:00');
  document.getElementById('modal-title').textContent=`${d.getMonth()+1}月${d.getDate()}日（${DAYS_JA[d.getDay()]}）の予定`;
  document.getElementById('modal-events').innerHTML=dayEvents.map(s=>{
    const cc=s.content?CONTENT_COLORS[s.content]:null;

// Notion API呼び出し
async function notionAPI(method, endpoint, body) {
  const target = `https://api.notion.com/v1${endpoint}`;
  const url = `https://corsproxy.io/?${encodeURIComponent(target)}`;
  const res = await fetch(url, {
    method,
    headers: {
      'Authorization': `Bearer ${NOTION_API_KEY}`,
      'Notion-Version': '2022-06-28',
      'Content-Type': 'application/json',
    },
    ...(body ? { body: JSON.stringify(body) } : {})
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Notion API error: ${res.status} ${err}`);
  }
  return res.json();
}

// ===== スケジュール =====
async function loadSchedules() {
  try {
    const {year, month} = getCurrentYM();
    const startOfMonth = `${year}-${String(month+1).padStart(2,'0')}-01`;
    const endOfMonth = new Date(year, month+1, 0);
    const endStr = fmt(endOfMonth);
    const data = await notionAPI('POST', `/databases/${SCHEDULE_DB_ID}/query`, {
      filter: { property: '日付', date: { on_or_after: startOfMonth } },
      sorts: [{ property: '日付', direction: 'ascending' }]
    });
    schedules = data.results.map(p => {
      const props = p.properties;
      const teacher = props['先生名']?.select?.name || '';
      const tc = getTC(teacher);
      const dateRange = props['日付']?.date;
      return {
        id: p.id,
        notionId: p.id,
        date: dateRange?.start?.slice(0,10) || '',
        dateEnd: dateRange?.end?.slice(0,10) || dateRange?.start?.slice(0,10) || '',
        timeStart: props['開始時間']?.rich_text?.[0]?.plain_text || '',
        timeEnd: props['終了時間']?.rich_text?.[0]?.plain_text || '',
        teacher,
        content: props['内容']?.select?.name || '',
        memo: props['メモ']?.rich_text?.[0]?.plain_text || '',
        color: tc.bg, textColor: tc.text
      };
    });
    renderCalendar(); renderList();
  } catch(e) { console.error('スケジュール読み込みエラー', e); }
}

async function addSchedule() {
  const date=document.getElementById('f-date').value;
  const timeStart=document.getElementById('f-time-start').value;
  const timeEnd=document.getElementById('f-time-end').value;
  const teacher=document.getElementById('f-teacher').value;
  const content=document.getElementById('f-content').value;
  const memo=document.getElementById('f-memo').value.trim();
  if (!date||!timeStart||!teacher){alert('日付・開始時間・先生名は必須です');return;}
  const dateEnd=document.getElementById('f-date-end').value || date;
  if (dateEnd===date && timeEnd&&timeToMin(timeEnd)<=timeToMin(timeStart)){alert('終了時間は開始時間より後にしてください');return;}
  setLoading(true);
  try {
    await notionAPI('POST', '/pages', {
      parent: { database_id: SCHEDULE_DB_ID },
      properties: {
        '名前': { title: [{ text: { content: `${teacher} ${date}` } }] },
        '日付': { date: { start: date, end: dateEnd !== date ? dateEnd : null } },
        '開始時間': { rich_text: [{ text: { content: timeStart } }] },
        '終了時間': { rich_text: [{ text: { content: timeEnd } }] },
        '先生名': { select: { name: teacher } },
        ...(content ? { '内容': { select: { name: content } } } : {}),
        ...(memo ? { 'メモ': { rich_text: [{ text: { content: memo } }] } } : {}),
      }
    });
    document.getElementById('f-memo').value='';
    await loadSchedules();
  } catch(e) { alert('保存に失敗しました: ' + e.message); }
  setLoading(false);
}

async function deleteSchedule(id) {
  setLoading(true);
  try {
    await notionAPI('PATCH', `/pages/${id}`, { in_trash: true });
    await loadSchedules();
  } catch(e) { alert('削除に失敗しました'); }
  setLoading(false);
  closeModal();
}

async function loadTodos() {
  try {
    const data = await notionAPI('POST', `/databases/${TODO_DB_ID}/query`, {
      sorts: [{ property: '完了', direction: 'ascending' }]
    });
    todos = data.results.map(p => {
      const props = p.properties;
      return {

        notionId: p.id,

        teacher: props['先生名']?.select?.name || '',
        done: props['完了']?.checkbox || false,
      };
    });

}

async function toggleTodo(id) {
  const t = todos.find(x=>x.id===id);
  if (!t) return;
  setLoading(true);
  try {
    await notionAPI('PATCH', `/pages/${id}`, {
      properties: { '完了': { checkbox: !t.done } }
    });
    await loadTodos();
  } catch(e) { alert('更新に失敗しました'); }
  setLoading(false);
}

async function deleteTodo(id) {

  try {
    await notionAPI('PATCH', `/pages/${id}`, { in_trash: true });
    await loadTodos();
  } catch(e) { alert('削除に失敗しました'); }
  setLoading(false);
}
